# K4 Remote — CI pipeline (NFR-PORT-02): fmt + clippy + tests + traceability
# gate + dependency audit, across the target platforms
# (Linux x86_64, Linux arm64 / Raspberry Pi OS, macOS, Windows).
#
# System libraries needed by the default features: libopus (audio codec),
# ALSA (Linux audio), OpenSSL (TLS-PSK), libudev (serial), libsecret + libdbus
# (keychain — the keyring sync-secret-service backend links libdbus via pkg-config).
# macOS/Windows build OpenSSL from source via the `vendored-tls` feature.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  # Run the full cross-platform set on demand without cutting a tag.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Cross-platform builds are slow (the Windows job builds libopus and OpenSSL
  # from source and has taken >14 min on a cold cache). Running them on every
  # PR buys little: the code is portable Rust and the platform-specific risk is
  # in packaging, not in the logic. So PRs get the fast Linux path, and the full
  # matrix runs where it actually matters — on a release tag — plus on demand.
  targets:
    name: Select targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      full: ${{ steps.pick.outputs.full }}
    steps:
      - id: pick
        # Values are passed via env rather than interpolated into the script,
        # so a crafted ref name cannot inject shell.
        env:
          REF: ${{ github.ref }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          LINUX='{"os":"ubuntu-latest","name":"linux-x86_64"}'
          ARM='{"os":"ubuntu-24.04-arm","name":"linux-arm64"}'
          MAC='{"os":"macos-latest","name":"macos","features":"--features vendored-tls"}'
          if [[ "$REF" == refs/tags/v* || "$EVENT" == workflow_dispatch ]]; then
            echo "matrix=[$LINUX,$ARM,$MAC]" >> "$GITHUB_OUTPUT"
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[$LINUX]" >> "$GITHUB_OUTPUT"
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

  fmt-clippy:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: System libraries
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev libssl-dev libudev-dev libsecret-1-dev libdbus-1-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Build + test. Always Linux x86_64 (which also carries the traceability
  # gate, so it runs on every PR); arm64 (Raspberry Pi OS arch) and macOS are
  # added on a release tag or a manual run — see the `targets` job.
  test:
    name: Test (${{ matrix.name }})
    needs: targets
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.targets.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev libssl-dev libudev-dev libsecret-1-dev libdbus-1-dev pkg-config
      - name: System libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install opus pkg-config
      - name: Test (non-hardware)
        run: cargo test --workspace ${{ matrix.features }}
      - name: Traceability gate (R3/R4)
        run: cargo run --quiet -p xtask
      - name: TLS-PSK feature test
        run: cargo test -p k4-transport ${{ matrix.features || '--features tls' }}

  # Windows build: libopus and OpenSSL are both built from source
  # (audiopus_sys + openssl `vendored`), so only a C toolchain, NASM, and CMake
  # are needed — all provided below / preinstalled on the runner.
  build-windows:
    name: Build (windows-x86_64)
    needs: targets
    if: needs.targets.outputs.full == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: NASM (vendored OpenSSL asm)
        uses: ilammy/setup-nasm@v1
      - name: Build
        env:
          # CMake 4.x rejects libopus's pre-3.5 cmake_minimum_required; allow it.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cargo build -p k4remote --release --features vendored-tls

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
