# K4 Remote — release packaging (NFR-PKG-01). On a `vX.Y.Z` tag, build release
# binaries per platform and publish a GitHub Release with:
#   - Debian .deb  (x86_64 + arm64/Raspberry Pi OS)  via cargo-deb
#   - .tar.gz binaries (Linux x86_64/arm64, macOS)
#   - .zip binary + setup.exe installer (Windows x86_64, via Inno Setup)
# The Arch PKGBUILD (packaging/PKGBUILD) is published separately to the AUR.
name: Release

on:
  push:
    tags: ["v*"]
  # Manual dry-run: builds the artifacts (incl. the Windows installer) and
  # uploads them as workflow artifacts, but does not publish a Release.
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

jobs:
  package:
    name: Package (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-x86_64, deb: true }
          - { os: ubuntu-24.04-arm, name: linux-arm64, deb: true }
          - { os: macos-latest, name: macos, features: "--features vendored-tls" }
          - { os: windows-latest, name: windows-x86_64, features: "--features vendored-tls" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: System libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev libssl-dev libudev-dev libsecret-1-dev libdbus-1-dev pkg-config
      - name: System libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install opus pkg-config
      - name: NASM (Windows / vendored OpenSSL asm)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary
        env:
          # Windows builds libopus + OpenSSL from source; CMake 4.x needs this to
          # accept libopus's pre-3.5 cmake_minimum_required. No-op elsewhere.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cargo build -p k4remote --release ${{ matrix.features }}

      - name: Debian package (.deb)
        if: matrix.deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p k4remote --no-build --output "k4remote-${{ matrix.name }}.deb"

      - name: Archive binary (Unix)
        if: runner.os != 'Windows'
        run: tar -C target/release -czf "k4remote-${{ matrix.name }}.tar.gz" k4remote
      - name: Archive binary (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/k4remote.exe -DestinationPath "k4remote-${{ matrix.name }}.zip"
      - name: Installer (Windows / Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" packaging\windows\k4remote.iss
          if (-not (Test-Path "k4remote-windows-x86_64-setup.exe")) { throw "installer not produced" }

      - name: Publish to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            k4remote-${{ matrix.name }}.deb
            k4remote-${{ matrix.name }}.tar.gz
            k4remote-${{ matrix.name }}.zip
            k4remote-windows-x86_64-setup.exe
          fail_on_unmatched_files: false
      - name: Upload artifacts (dry-run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: k4remote-${{ matrix.name }}
          path: |
            k4remote-${{ matrix.name }}.deb
            k4remote-${{ matrix.name }}.tar.gz
            k4remote-${{ matrix.name }}.zip
            k4remote-windows-x86_64-setup.exe
          if-no-files-found: ignore
