<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1f26"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D9BFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3D9BFF" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Panel background (dark squircle, subtle blue edge) -->
  <rect x="16" y="16" width="480" height="480" rx="112"
