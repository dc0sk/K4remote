  <!-- "K4" wordmark -->
  <text x="256" y="300" text-anchor="middle"
        font-family="DejaVu Sans, sans-serif" font-weight="bold"
        font-size="230" fill="#ECEFF2">K4</text>

  <!-- Panadapter trace along the bottom -->
  <path d="M 70 450 L 110 442 L 138 398 L 162 448 L 205 436 L 240 356 L 266 444
           L 316 430 L 356 372 L 392 438 L 430 446 L 442 450 L 442 462 L 70 462 Z"
        fill="url(#spec)"/>
  <path d="M 70 450 L 110 442 L 138 398 L 162 448 L 205 436 L 240 356 L 266 444
           L 316 430 L 356 372 L 392 438 L 430 446 L 442 450"
        fill="none" stroke="#5BB0FF" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Amber TX indicator -->
  <circle cx="424" cy="96" r="22" fill="#FF9A1E"/>
</svg>
